services:
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports: ["9010:9000", "9011:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes: ["minio_data:/data"]

  bank-mock:
    build: ./backend
    command: uvicorn mocks.bank_server:app --host 0.0.0.0 --port 9000
    env_file: ./backend/.env
    ports: ["9000:9000"]

  land-mock:
    build: ./backend
    command: uvicorn mocks.land_records_server:app --host 0.0.0.0 --port 9100
    env_file: ./backend/.env
    ports: ["9100:9100"]

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: ./backend/.env
    ports: ["8000:8000"]
    depends_on:
      mongo: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./backend:/app
      - model_data:/opt/models

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery worker --loglevel=info --concurrency=2
    env_file: ./backend/.env
    depends_on:
      mongo: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./backend:/app
      - model_data:/opt/models

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports: ["5173:5173"]
    environment:
      VITE_API_BASE: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
  minio_data:
  model_data:
